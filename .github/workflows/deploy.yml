name: Deploy Backend
run-name: "Deploy ${{ inputs.tag }} to ${{ inputs.environment }}"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        type: environment
      tag:
        description: "Git Tag (e.g. 1.0.0)"
        required: true
        type: string

jobs:
  deploy:
    name: Deploy v${{ inputs.tag }} to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: write

    steps:
      # ----------------------------------------------------------
      # Verify that Git tag exists in current repository
      # ----------------------------------------------------------
      - name: Verify Git tag exists
        uses: actions/github-script@v7
        env:
          TAG: ${{ inputs.tag }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.TAG;

            try {
              await github.rest.git.getRef({
                owner,
                repo,
                ref: `tags/${tag}`,
              });
              core.info(`Tag '${tag}' exists.`);
            } catch (e) {
              if (e.status === 404) {
                core.setFailed(`Tag '${tag}' does not exist. Aborting deployment.`);
              } else {
                throw e;
              }
            }

      # ----------------------------------------------------------
      # Authenticate using GitHub App (required for cross-repo access)
      # ----------------------------------------------------------
      - name: Authenticate as GitHub App
        id: app-auth
        uses: tibdex/github-app-token@v1
        with:
          app_id: ${{ secrets.GH_APP_ID }}
          private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      # ----------------------------------------------------------
      # Checkout Terraform repository
      # ----------------------------------------------------------
      - name: Checkout Terraform repo
        uses: actions/checkout@v4
        with:
          repository: SFOE-prometheon/prometheon-emobility-${{ inputs.environment }}
          token: ${{ steps.app-auth.outputs.token }}
          path: tf-repo

      # ----------------------------------------------------------
      # Update backend version inside Terraform variables
      # ----------------------------------------------------------
      - name: Update version
        run: |
          cd tf-repo
          sed -i "s/backend_app_version = \".*\"/backend_app_version = \"${{ inputs.tag }}\"/" deploy.auto.tfvars

      # ----------------------------------------------------------
      # Commit and push changes to Terraform repository
      # ----------------------------------------------------------
      - name: Commit & push changes
        run: |
          cd tf-repo
          git config user.name "GitHub Actions"
          git config user.email "noreply@github.com"
          git add deploy.auto.tfvars
          git commit -m "chore(deploy): deploy backend version ${{ inputs.tag }}"
          git push